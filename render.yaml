services:
  - type: web
    name: faccma-chatbot
    runtime: python
    buildCommand: pip install -r requirements_out.txt
    startCommand: uvicorn faccma_backend_out:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_DB
        value: false
      - key: JSON_FILE
        value: faccma_unified_out.json
